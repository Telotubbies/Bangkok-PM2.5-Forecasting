name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "app/pm2.5/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/pm2.5/**"
      - ".github/workflows/ci-frontend.yml"

defaults:
  run:
    working-directory: app/pm2.5

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/pm2.5/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/pm2.5/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/pm2.5/dist/
          retention-days: 7
