# Bangkok PM2.5 Forecasting - Configuration Parameters
# STC-HGAT Model Hyperparameters and Pipeline Settings

# Data parameters
data:
  bronze_path: data/bronze
  silver_path: data/silver
  stations_path: data/stations/bangkok_stations.parquet
  train_ratio: 0.70
  val_ratio: 0.15
  sequence_length: 30
  forecast_horizons: [1, 3, 7]
  features:
    - pm2_5
    - pm10
    - temperature_2m
    - relative_humidity_2m
    - surface_pressure
    - precipitation
    - wind_speed_10m
    - wind_direction_10m
    - cloud_cover

# Graph construction parameters
graph:
  spatial_threshold_km: 50.0
  correlation_threshold: 0.3
  num_regions: 5
  wind_edge_threshold: 0.5
  hyperedge_sizes: [3, 5, 7]
  seasonal_pattern: true

# Model architecture parameters
model:
  hidden_dim: 128
  num_hypergat_layers: 2
  num_hgat_layers: 2
  num_heads: 4
  dropout: 0.2
  activation: gelu
  use_layer_norm: true
  use_residual: true

# Training parameters
training:
  learning_rate: 0.001
  batch_size: 32
  epochs: 100
  early_stopping_patience: 15
  gradient_clip_value: 1.0
  optimizer: adamw
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5

# Loss function parameters
loss:
  lambda_contrastive: 0.1
  temperature: 0.07
  aw_loss_alpha: 2.0
  aw_loss_beta: 0.5

# Evaluation parameters
evaluation:
  metrics:
    - mae
    - rmse
    - r2
    - mape
  baseline: persistence
  extreme_threshold: 75.0  # µg/m³

# MLflow parameters
mlflow:
  tracking_uri: file:./mlruns
  experiment_name: stc-hgat-pm25-forecasting
  artifact_location: ./mlartifacts
  log_models: true
  log_params: true
  log_metrics: true

# Optuna parameters
optuna:
  study_name: stc-hgat-optimization
  storage: sqlite:///optuna.db
  n_trials: 50
  direction: minimize
  metric: val_loss
  sampler: tpe
  pruner: median

# Paths
paths:
  processed_data: data/processed
  models: models
  metrics: metrics
  plots: plots
  results: results
  logs: logs
